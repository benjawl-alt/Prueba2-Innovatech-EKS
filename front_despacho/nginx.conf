server {
    listen 80;
    server_name localhost;

    # 1. Servir los archivos estáticos de React (Vite)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Redirigir el microservicio de Ventas a la IP Privada (Puerto 8081)
    location /api/v1/ventas {
        proxy_pass http://10.0.2.51:8081/api/v1/ventas;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Redirigir el microservicio de Despachos a la IP Privada (Puerto 8082)
    location /api/v1/despachos {
        proxy_pass http://10.0.2.51:8082/api/v1/despachos;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}