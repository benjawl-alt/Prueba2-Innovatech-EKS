services:
  database:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db # IE3: Persistencia de datos

  back-ventas:
    build: ./back-Ventas_SpringBoot/Springboot-API-REST
    ports:
      - "8081:8080"
    depends_on:
      - database

  back-despacho:
    build: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    ports:
      - "8082:8080"
    depends_on:
      - database

  front-despacho:
    build: ./front_despacho
    ports:
      - "80:80"
    depends_on:
      - back-ventas
      - back-despacho

volumes:
  db_data: