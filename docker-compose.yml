services:
  database:
    image: mongo:latest
    container_name: app-database-1 # Le damos un nombre fijo para que el backend lo encuentre
    ports:
      - "27017:27017"
    volumes:
      - db_data:/data/db

  back-ventas:
    build: ./back-Ventas_SpringBoot/Springboot-API-REST
    ports:
      - "8081:8080"
    environment:
      # AQUÍ está la solución: Le pasamos los valores que el log pedía
      - DB_ENDPOINT=database
      - DB_PORT=27017
      - DB_NAME=innovatech_db
    depends_on:
      - database

  back-despacho:
    build: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    ports:
      - "8082:8080"
    environment:
      - DB_ENDPOINT=database
      - DB_PORT=27017
      - DB_NAME=innovatech_db
    depends_on:
      - database

  front-despacho:
    build: ./front_despacho
    ports:
      - "80:80"
    depends_on:
      - back-ventas
      - back-despacho

volumes:
  db_data:
