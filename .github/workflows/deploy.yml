name: Deploy Innovatech AWS

on:
  push:
    branches: [ "deploy" ] # Se activa al subir cambios a la rama deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Definimos todas las variables que GitHub le pasará a la instancia EC2
          envs: VITE_API_URL,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN
          script: |
            # 1. Asegurar que estamos en la carpeta correcta
            mkdir -p /home/ec2-user/app
            cd /home/ec2-user/app

            # 2. Configurar las credenciales de AWS CLI (Requerimiento del profesor)
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            export AWS_DEFAULT_REGION=us-east-1

            # 3. Configurar la variable del API para el Front
            export VITE_API_URL=${{ secrets.VITE_API_URL }}

            # 4. ACTIVACIÓN DE BUILDX (Paso crítico para el éxito del build)
            # Esto registra el binario manual como el constructor oficial de Docker
            sudo docker-buildx install

            # 5. Levantar los contenedores
            # El flag -E mantiene las variables exportadas (como VITE_API_URL)
            sudo -E docker-compose up -d --build
