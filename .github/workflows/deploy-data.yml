name: Deploy Data to EC2 Privada (MongoDB)

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'docker-compose.data.yml'
    workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy MongoDB via Bastion (Frontend)
        uses: appleboy/ssh-action@master
        with:
          # 1. Destino final (IP Privada de tu máquina de Datos)
          host: ${{ secrets.EC2_DATA_HOST }} 
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          
          # 2. Configuración del Puente Bastión (Frontend Público)
          proxy_host: ${{ secrets.EC2_HOST }}        
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}   
          
          script: |
            sudo dnf update -y
            sudo dnf install git docker -y
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user
            
            # Instalar componente Buildx para consistencia
            sudo mkdir -p /usr/libexec/docker/cli-plugins
            sudo curl -SL https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-x86_64 -o /usr/libexec/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-buildx
            
            mkdir -p /home/ec2-user/app
            cd /home/ec2-user/app
            
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/benjawl-alt/Prueba2-Innovatech.git
            fi
            
            git fetch origin deploy
            git reset --hard origin/deploy
            
            sudo docker compose -f docker-compose.data.yml up -d --build