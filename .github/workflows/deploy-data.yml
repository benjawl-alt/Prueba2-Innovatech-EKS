name: Deploy Data to EC2 Privada (MongoDB)

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'docker-compose.data.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # PASO 1: Instalar Buildx en la arquitectura correcta de AWS (ARM64)
      - name: Install Buildx Plugin Globally
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_DATA_HOST }} 
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.EC2_HOST }}        
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}   
          script: |
            sudo mkdir -p /usr/libexec/docker/cli-plugins
            sudo curl -SL https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-arm64 -o /usr/libexec/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-buildx

      # PASO 2: Asegurar herramientas base indispensables
      - name: Install Environment Dependencies
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_DATA_HOST }} 
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.EC2_HOST }}        
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}   
          script: |
            sudo dnf install git docker -y
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user

      # PASO 3: Sincronizar repositorio y desplegar base de datos
      - name: Deploy MongoDB Database
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_DATA_HOST }} 
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.EC2_HOST }}        
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}   
          script: |
            sudo mkdir -p /home/ec2-user/app
            cd /home/ec2-user/app
            
            if [ ! -d ".git" ]; then
              sudo git init
              sudo git remote add origin https://github.com/benjawl-alt/Prueba2-Innovatech.git
            fi
            
            sudo git fetch origin deploy
            sudo git reset --hard origin/deploy
            
            sudo docker compose -f docker-compose.data.yml up -d --build