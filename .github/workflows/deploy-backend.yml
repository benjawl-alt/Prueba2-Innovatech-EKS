name: Deploy Backend to EC2 Privada

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'back-Ventas_SpringBoot/**'
      - 'back-Despachos_SpringBoot/**'
      - 'docker-compose.back.yml'
    workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy Backend via Bastion (Frontend)
        uses: appleboy/ssh-action@master
        with:
          # 1. Destino final (IP Privada de tu máquina Backend)
          host: ${{ secrets.EC2_BACK_HOST }} 
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          
          # 2. Configuración del Puente Bastión (Frontend Público)
          # Eliminamos ssh_key_transfer para limpiar el Warning
          proxy_host: ${{ secrets.EC2_HOST }}        
          proxy_username: ec2-user
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}   
          
          # 3. Registro de variables para pasarlas al script
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN
          
          script: |
            # 1. Instalar herramientas básicas
            sudo dnf update -y
            sudo dnf install git docker -y
            sudo systemctl start docker
            sudo systemctl enable docker
            sudo usermod -aG docker ec2-user
            
            # 2. INSTALAR COMPONENTE BUILDX (La solución al error)
            sudo mkdir -p /usr/libexec/docker/cli-plugins
            sudo curl -SL https://github.com/docker/buildx/releases/download/v0.17.1/buildx-v0.17.1.linux-x86_64 -o /usr/libexec/docker/cli-plugins/docker-buildx
            sudo chmod +x /usr/libexec/docker/cli-plugins/docker-buildx
            
            # Preparar el directorio de trabajo
            mkdir -p /home/ec2-user/app
            cd /home/ec2-user/app
            
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://github.com/benjawl-alt/Prueba2-Innovatech.git
            fi
            
            git fetch origin deploy
            git reset --hard origin/deploy
            
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            export AWS_DEFAULT_REGION=us-east-1
            
            sudo -E docker compose -f docker-compose.back.yml up -d --build