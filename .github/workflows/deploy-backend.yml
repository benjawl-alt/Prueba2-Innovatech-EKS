name: Deploy Backend to EC2 Privada

on:
  push:
    branches: [ "deploy" ]
    paths:
      - 'back-Ventas_SpringBoot/**'
      - 'back-Despachos_SpringBoot/**'
      - 'docker-compose.back.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy Backend via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_BACK_HOST }} # <-- Tu nueva IP de la máquina de desarrollo/backend
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 1. PASO CLAVE: Registramos todas las variables de AWS que tienes en tus secretos
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN
          script: |
            mkdir -p /home/ec2-user/app
            cd /home/ec2-user/app
            
            # 2. PASO CLAVE: Obligamos a la máquina a descargar la última estructura del Monorepo
            git fetch origin deploy
            git reset --hard origin/deploy
            
            # 3. PASO CLAVE: Exportamos los tokens temporales de AWS Academy (Requerimiento del profesor)
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            export AWS_DEFAULT_REGION=us-east-1
            
            sudo docker-buildx install
            
            # 4. PASO CLAVE: Levantamos usando el archivo exclusivo del backend heredando las credenciales (-E)
            sudo -E docker-compose -f docker-compose.back.yml up -d --build